<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#153a31">
    <meta name="description" content="每周自动汇集国内外风电齿轮箱与轴承研究资讯，提供中文工程摘要、搜索和原文链接。">
    <meta property="og:title" content="风传智研｜齿轮箱与轴承前沿情报">
    <meta property="og:description" content="每周更新的风电传动链研发资讯与论文摘要。">
    <meta property="og:image" content="./assets/share-cover.png">
    <meta property="og:type" content="website">
    <title>风传智研｜齿轮箱与轴承前沿情报</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icon-192.png">
    <link rel="stylesheet" href="./styles.css">
    <script src="./vendor/lucide.min.js" defer></script>
    <script src="./runtime-config.js"></script>
    <script src="./app.js" type="module"></script>
  </head>
  <body>
    <a class="skip-link" href="#article-feed">跳到资讯列表</a>

    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="./" aria-label="风传智研首页">
          <span class="brand-mark" aria-hidden="true">
            <i data-lucide="chart-no-axes-combined"></i>
          </span>
          <span>
            <strong>风传智研</strong>
            <small>齿轮箱与轴承前沿情报</small>
          </span>
        </a>
        <div class="topbar-actions">
          <span class="freshness" id="freshness">
            <span class="status-dot" aria-hidden="true"></span>
            正在同步
          </span>
          <button class="icon-button" id="share-app" type="button" title="分享风传智研" aria-label="分享风传智研">
            <i data-lucide="share-2"></i>
          </button>
          <button class="icon-button mobile-only" id="open-filters-mobile" type="button" title="筛选资讯" aria-label="筛选资讯">
            <i data-lucide="sliders-horizontal"></i>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="brief-band" aria-labelledby="brief-title">
        <div class="brief-media" aria-hidden="true"></div>
        <div class="content-shell brief-inner">
          <div class="brief-main">
            <div class="eyebrow">
              <i data-lucide="calendar-range"></i>
              <span id="brief-period">本周情报简报</span>
              <span class="brief-mode" id="brief-mode">加载中</span>
            </div>
            <h1 id="brief-title">正在整理本周传动链情报</h1>
            <p id="brief-summary">正在加载最新采集结果与工程摘要。</p>
            <div class="signal-list" id="signal-list" aria-label="本周关键信号"></div>
          </div>
          <div class="brief-metrics" aria-label="本周资料统计">
            <div class="metric">
              <strong id="metric-total">--</strong>
              <span>高相关资料</span>
            </div>
            <div class="metric">
              <strong id="metric-domestic">--</strong>
              <span>国内资讯</span>
            </div>
            <div class="metric">
              <strong id="metric-papers">--</strong>
              <span>研究论文</span>
            </div>
          </div>
        </div>
      </section>

      <section class="content-shell workspace" aria-label="情报工作台">
        <div class="primary-column">
          <div class="search-panel">
            <label class="search-box" for="search-input">
              <i data-lucide="search" aria-hidden="true"></i>
              <input id="search-input" type="search" autocomplete="off" placeholder="搜索故障机理、轴承型号、润滑或监测方法">
              <kbd>Ctrl K</kbd>
              <button class="clear-search" id="clear-search" type="button" title="清空搜索" aria-label="清空搜索" hidden>
                <i data-lucide="x"></i>
              </button>
            </label>
            <button class="filter-button desktop-only" id="open-filters" type="button">
              <i data-lucide="sliders-horizontal"></i>
              筛选
              <span class="filter-count" id="filter-count" hidden>0</span>
            </button>
          </div>

          <nav class="category-tabs" id="category-tabs" aria-label="资讯分类">
            <button class="category-tab active" type="button" data-category="全部">全部</button>
            <button class="category-tab" type="button" data-category="齿轮箱">齿轮箱</button>
            <button class="category-tab" type="button" data-category="轴承">轴承</button>
            <button class="category-tab" type="button" data-category="状态监测">状态监测</button>
            <button class="category-tab" type="button" data-category="润滑">润滑</button>
            <button class="category-tab" type="button" data-category="学术论文">学术论文</button>
          </nav>

          <div class="feed-toolbar">
            <div>
              <h2 id="feed-title">最新情报</h2>
              <p id="result-count" aria-live="polite">正在加载资料</p>
            </div>
            <div class="segmented-control" role="group" aria-label="排序方式">
              <button class="active" type="button" data-sort="latest">最新</button>
              <button type="button" data-sort="reliability">可靠度</button>
              <button type="button" data-sort="personal">为我推荐</button>
            </div>
          </div>

          <div class="active-filters" id="active-filters" aria-label="已启用筛选条件"></div>
          <div class="article-feed" id="article-feed" aria-live="polite">
            <div class="loading-card"></div>
            <div class="loading-card"></div>
            <div class="loading-card"></div>
          </div>
        </div>

        <aside class="insight-rail" aria-label="个性化情报">
          <section class="rail-section">
            <div class="section-heading">
              <div>
                <span class="section-kicker">WATCHLIST</span>
                <h2>关注关键词</h2>
              </div>
              <i data-lucide="radar" aria-hidden="true"></i>
            </div>
            <form class="watch-form" id="watch-form">
              <label class="sr-only" for="watch-input">新增关注关键词</label>
              <input id="watch-input" maxlength="24" placeholder="例如：行星架轴承">
              <button class="icon-button" type="submit" title="添加关键词" aria-label="添加关键词">
                <i data-lucide="plus"></i>
              </button>
            </form>
            <div class="watch-list" id="watch-list"></div>
          </section>

          <section class="rail-section">
            <div class="section-heading">
              <div>
                <span class="section-kicker">TREND RADAR</span>
                <h2>主题热度</h2>
              </div>
              <i data-lucide="activity" aria-hidden="true"></i>
            </div>
            <div class="trend-list" id="trend-list"></div>
          </section>

          <section class="rail-section saved-summary">
            <div>
              <span class="section-kicker">LIBRARY</span>
              <h2>我的收藏</h2>
              <p><strong id="saved-count">0</strong> 条资料保存在本机</p>
            </div>
            <button class="quiet-button" id="show-saved" type="button">
              查看
              <i data-lucide="arrow-right"></i>
            </button>
          </section>
        </aside>
      </section>
    </main>

    <nav class="mobile-nav mobile-only" aria-label="移动端导航">
      <button class="active" type="button" data-view="all">
        <i data-lucide="newspaper"></i>
        <span>情报</span>
      </button>
      <button type="button" data-view="search">
        <i data-lucide="search"></i>
        <span>搜索</span>
      </button>
      <button type="button" data-view="saved">
        <i data-lucide="bookmark"></i>
        <span>收藏</span>
      </button>
    </nav>

    <dialog class="article-dialog" id="article-dialog">
      <div class="dialog-shell">
        <div class="dialog-header">
          <span class="dialog-source" id="dialog-source"></span>
          <button class="icon-button" id="close-dialog" type="button" title="关闭" aria-label="关闭">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div id="dialog-content"></div>
      </div>
    </dialog>

    <dialog class="filter-dialog" id="filter-dialog">
      <form class="filter-shell" method="dialog" id="filter-form">
        <div class="filter-header">
          <div>
            <span class="section-kicker">FILTERS</span>
            <h2>筛选资讯</h2>
          </div>
          <button class="icon-button" value="cancel" type="submit" title="关闭" aria-label="关闭">
            <i data-lucide="x"></i>
          </button>
        </div>
        <fieldset>
          <legend>来源地区</legend>
          <label><input type="radio" name="region" value="全部" checked> 全部</label>
          <label><input type="radio" name="region" value="国内"> 国内</label>
          <label><input type="radio" name="region" value="海外"> 海外</label>
        </fieldset>
        <fieldset>
          <legend>资料类型</legend>
          <label><input type="radio" name="sourceType" value="全部" checked> 全部</label>
          <label><input type="radio" name="sourceType" value="论文"> 论文</label>
          <label><input type="radio" name="sourceType" value="资讯"> 行业与技术资讯</label>
        </fieldset>
        <div class="filter-actions">
          <button class="quiet-button" id="reset-filters" type="button">重置</button>
          <button class="primary-button" value="apply" type="submit">
            <i data-lucide="check"></i>
            应用筛选
          </button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </body>
</html>
